name: CI

on:
  push:
    branches: [main, working, matei, ene]
  pull_request:
    branches: [main, working]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: civicmind_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d civicmind_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-only-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/civicmind_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/civicmind_test
      CORS_ALLOW_ALL_ORIGINS: "False"
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Run tests
        run: python manage.py test --noinput

  legislative-intelligence-health:
    name: Legislative Intelligence Health
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legislative-intelligence
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile non-scraper Python modules
        run: |
          python -m compileall \
            api agents db \
            env_setup.py eval_agents.py eval_rag.py fetch_bill_from_db.py \
            main.py personalization.py rag_index.py run_agents.py -q
