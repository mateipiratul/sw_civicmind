services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - static_volume:/app/staticfiles
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    networks:
      - civicmind-network

  ai-service:
    build:
      context: ./legislative-intelligence
      dockerfile: Dockerfile
    volumes:
      - ./legislative-intelligence/data:/app/data
    env_file:
      - ./legislative-intelligence/.env
    ports:
      - "8001:8001"
    networks:
      - civicmind-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai-service
    networks:
      - civicmind-network

networks:
  civicmind-network:
    driver: bridge

volumes:
  static_volume:
